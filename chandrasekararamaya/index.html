<!-- ================== MAIN SCRIPT ================== -->
<script>
fetch("info.txt")
.then(res => res.text())
.then(data => {

const info = {};
data.split("\n").forEach(line => {
const parts = line.split("=");
if(parts.length >= 2){
const key = parts[0].trim();
const value = parts.slice(1).join("=").trim();
info[key] = value;
}
});

/* ===== TEXT CONTENT ===== */
document.getElementById("templeSI").textContent = info.si || "";
document.getElementById("templeEN").textContent = info.en || "";
document.getElementById("abbot-info").textContent = info.abbot || "";
document.querySelector(".event-note").textContent = info.note || "";
document.querySelector(".event-note1").textContent = info.note1 || "";
/* ===== TELEPHONE CONTROL ===== */
const tel = info.telephone || "-";
const telLink = document.querySelector('a[href^="tel:"]');

if(tel === "-" || tel.trim() === ""){
    telLink.style.display = "none"; // hide button
}else{
    telLink.href = "tel:" + tel;
}
/* ===== TITLE ===== */
const newTitle = (info.en || "Temple") + " - " + (info.district || "") + " | Sri Lanka Buddhist Temple";
document.title = newTitle;

/* ===== META DESCRIPTION ===== */
if(info.si && info.district){
const description = info.si + " " + info.district + " දිස්ත්‍රික්කයේ පිහිටි බෞද්ධ විහාරස්ථානයකි. ඉතිහාසය, ඡායාරූප සහ සිතියම veheravihara.lk";
document.getElementById("metaDescription").setAttribute("content", description);
}

/* ===== CANONICAL URL ===== */
const cleanURL = window.location.href.split("#")[0].split("?")[0];
document.getElementById("canonicalLink").setAttribute("href", cleanURL);

/* ===== OPEN GRAPH UPDATE ===== */
document.querySelector('meta[property="og:title"]').setAttribute("content", newTitle);

document.querySelector('meta[property="og:description"]').setAttribute(
"content",
document.getElementById("metaDescription").content
);

document.querySelector('meta[property="og:url"]').setAttribute("content", cleanURL);

})
.catch(err => console.error("Info load error:", err));
</script>
