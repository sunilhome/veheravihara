<body>

<a href="contact.html" class="top-icon top-mail">&#128233;</a>
</div>

<!-- content -->
<div class="content">

<!-- temple header -->
<div class="sub-band">

<img src="../provinces/1.png" class="sub-band-icon" alt="Temple icon Sri Lanka">

<div class="sub-band-text">
<p id="templeSI">Loading...</p>
<p id="templeVillage"></p>
</div>

<div class="sub-band-text1">
<p id="templeEN"></p>
</div>

</div>

<!-- CONTACT DETAILS -->
<div class="info-box">

<!-- Map -->
<div class="contact-item">
<iframe id="contact-map"
width="100%"
height="250"
style="border:0;"
loading="lazy"
referrerpolicy="no-referrer-when-downgrade">
</iframe>
</div>

<div class="contact-info">

<p class="contact-row" id="row-address">
<span class="label en">Address:</span>
<span class="label si">ලිපිනය:</span>
<span class="value" id="contact-address"></span>
</p>

<p class="contact-row" id="row-email">
<span class="label en">Email:</span>
<span class="label si">ඊ-තැපැල්:</span>
<span class="value" id="contact-email"></span>
</p>

<p class="contact-row" id="row-telephone">
<span class="label en">Telephone:</span>
<span class="label si">දුරකථන:</span>
<a class="value" id="contact-telephone"></a>
</p>

<p class="contact-row" id="row-website">
<span class="label en">Website:</span>
<span class="label si">වෙබ් අඩවිය:</span>
<span class="value" id="contact-website"></span>
</p>

</div>
</div>

</div>

<footer>
<div class="footer-content">
© ව්‍යාපෘතිය: සුනිල් රණසිංහ <br>
සංකල්පය: ශාසන සුභ සාධන දේශ කීර්ති ශ්‍රී දේශබන්දු<br>
සම්පත් රණසිංහ<br>
දත්ත: ධනේශ් රණසිංහ
</div>
</footer>

<!-- LOAD TEMPLE INFO -->
<script>

fetch("info.txt")
.then(res => res.text())
.then(data => {

const info = {};

data.split("\n").forEach(line => {
const parts = line.split("=");
if(parts.length >= 2){
const key = parts[0].trim();
const value = parts.slice(1).join("=").trim();
info[key] = value;
}
});

/* ===== BASIC TEXT ===== */
document.getElementById("templeSI").textContent = info.si || "";
document.getElementById("templeEN").textContent = info.en || "";
document.getElementById("templeVillage").textContent = info.village || "";

/* ===== TITLE ===== */
const newTitle = (info.en || "Temple") + " - Contact Details | Sri Lanka";
document.title = newTitle;

/* ===== META DESCRIPTION ===== */
document.getElementById("metaDescription")
.setAttribute("content", info.desc || "");

/* ===== MAP ===== */
if(info.map && info.map !== "-"){
document.getElementById("contact-map").src = info.map;
}else{
document.getElementById("contact-map").style.display = "none";
}

/* ===== ADDRESS ===== */
if(info.address && info.address !== "-"){
document.getElementById("contact-address").textContent = info.address;
}else{
document.getElementById("row-address").style.display = "none";
}

/* ===== EMAIL ===== */
if(info.email && info.email !== "-"){
document.getElementById("contact-email").innerHTML =
`<a href="mailto:${info.email}">${info.email}</a>`;
}else{
document.getElementById("row-email").style.display = "none";
}

/* ===== TELEPHONE ===== */
const tel = info.telephone || "-";
const telEl = document.getElementById("contact-telephone");

if(tel === "-" || tel.trim() === ""){
document.getElementById("row-telephone").style.display = "none";
}else{
const cleanTel = tel.replace(/\s+/g,"");
telEl.textContent = tel;
telEl.href = "tel:" + cleanTel;
}

/* ===== WEBSITE ===== */
if(info.website && info.website !== "-"){
document.getElementById("contact-website").innerHTML =
`<a href="${info.website}" target="_blank" rel="noopener noreferrer">${info.website}</a>`;
}else{
document.getElementById("row-website").style.display = "none";
}

})
.catch(err => console.log("Info load error", err));

</script>
