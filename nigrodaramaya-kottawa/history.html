<script>
let currentAudio = null;
let currentBtn = null;

function toggleAudio(id, btn) {
  const audio = document.getElementById(id);

  if (currentAudio === audio && !audio.paused) {
    audio.pause();
    audio.currentTime = 0;
    btn.classList.remove('active');
    currentAudio = null;
    currentBtn = null;
    return;
  }

  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  if (currentBtn) {
    currentBtn.classList.remove('active');
  }

  audio.play();
  btn.classList.add('active');

  currentAudio = audio;
  currentBtn = btn;

  audio.onended = function () {
    btn.classList.remove('active');
    currentAudio = null;
    currentBtn = null;
  };
}
</script>

<!-- LOAD HISTORY TEXT -->
<script>
async function loadInfo(lang) {

const file = (lang === 'si') ? 'info-si.txt' : 'info-en.txt';

const box = document.getElementById('temple-text');
const title = document.getElementById('history-title');

title.textContent = (lang === 'si') ? 'ඉතිහාසය' : 'History';

box.innerHTML = '';

try {

const res = await fetch(file);
const text = await res.text();

text.split(/\n\n+/).forEach(block => {

block = block.trim();
if(!block) return;

if(block.startsWith('#')){
const h = document.createElement('h3');
h.textContent = block.substring(1);
box.appendChild(h);
}
else{
const p = document.createElement('p');
p.textContent = block;
box.appendChild(p);
}

});

}

catch{
box.textContent = "Information not available.";
}

}

loadInfo('si');
</script>

<!-- LOAD TEMPLE INFO -->
<script>
fetch("info.txt")
.then(res => res.text())
.then(data => {

const info = {};

data.split("\n").forEach(line=>{
const parts = line.split("=");

if(parts.length>=2){
const key = parts[0].trim();
const value = parts.slice(1).join("=").trim();
info[key]=value;
}

});

document.getElementById("templeSI").textContent = info.si || "";
document.getElementById("templeEN").textContent = info.en || "";
document.getElementById("templeVillage").textContent = info.village || "";

const newTitle = (info.en || "Temple") + " | History | Sri Lanka";
document.title = newTitle;

document.getElementById("metaDescription")
.setAttribute("content", info.desc || "");

});
</script>
