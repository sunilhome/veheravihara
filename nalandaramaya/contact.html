<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temple Contact</title>
<meta name="description" id="metaDescription" content="">

<link rel="stylesheet" href="../provinces/new-style.css">
</head>

<body>

<!-- top band -->
<div class="top-band">
<a href="javascript:history.back()" class="top-icon">&#8592;</a>
<a href="/index.html" class="top-icon">&#127969;</a>
<a href="tel:+94766178102" class="top-icon top-tele">&#128222;</a>
<a href="contact.html" class="top-icon top-mail">&#128233;</a>
</div>

<!-- content -->
<div class="content">

<!-- temple header -->
<div class="sub-band">

<img src="../provinces/1.png" class="sub-band-icon" alt="Icon">

<div class="sub-band-text">
<p id="templeSI">Loading...</p>
<p id="templeVillage"></p>
</div>

<div class="sub-band-text1">
<p id="templeEN"></p>
</div>

</div>

<!-- CONTACT DETAILS -->
<div class="info-box">

<!-- Map -->
<div class="contact-item">
<iframe id="contact-map"
width="100%"
height="250"
style="border:0;"
loading="lazy"
referrerpolicy="no-referrer-when-downgrade">
</iframe>
</div>

<div class="contact-info">

<p class="contact-row">
<span class="label en">Address:</span>
<span class="label si">ලිපිනය:</span>
<span class="value" id="contact-address"></span>
</p>

<p class="contact-row">
<span class="label en">Email:</span>
<span class="label si">ඊ-තැපැල්:</span>
<span class="value" id="contact-email"></span>
</p>

<p class="contact-row">
<span class="label en">Telephone:</span>
<span class="label si">දුරකථන:</span>
<a class="value" id="contact-telephone"></a>
</p>

<p class="contact-row">
<span class="label en">Website:</span>
<span class="label si">වෙබ් අඩවිය:</span>
<span class="value" id="contact-website"></span>
</p>

</div>
</div>

</div>

<footer>
<div class="footer-content">
© ව්‍යාපෘතිය: සුනිල් රණසිංහ <br>
සංකල්පය: ශාසන සුභ සාධන දේශ කීර්ති ශ්‍රී දේශබන්දු<br>
සම්පත් රණසිංහ<br>
දත්ත: ධනේශ් රණසිංහ
</div>
</footer>

<!-- LOAD TEMPLE INFO -->
<script>

fetch("info.txt")
.then(res => res.text())
.then(data => {

const info = {};

data.split("\n").forEach(line => {

const parts = line.split("=");

if(parts.length >= 2){

const key = parts[0].trim();
const value = parts.slice(1).join("=").trim();
info[key] = value;

}

});

document.getElementById("templeSI").textContent = info.si || "";
document.getElementById("templeEN").textContent = info.en || "";
document.getElementById("templeVillage").textContent = info.village || "";

/* SEO title */
const newTitle = (info.en || "Temple") + " | Contact | Sri Lanka";
document.title = newTitle;

/* Meta description */
document.getElementById("metaDescription")
.setAttribute("content", info.desc || "");

/* Map */
if(info.map){
document.getElementById("contact-map").src = info.map;
}

/* Address */
if(info.address){
document.getElementById("contact-address").textContent = info.address;
}

/* Email */
if(info.email){
document.getElementById("contact-email").innerHTML =
`<a href="mailto:${info.email}">${info.email}</a>`;
}

/* Telephone */
if(info.telephone){
const tel = info.telephone.replace(/\s+/g,"");
const el = document.getElementById("contact-telephone");
el.textContent = info.telephone;
el.href = "tel:" + tel;
}

/* Website */
if(info.website){
document.getElementById("contact-website").innerHTML =
`<a href="${info.website}" target="_blank">${info.website}</a>`;
}

})
.catch(err => console.log("Info load error", err));

</script>

</body>
</html>
