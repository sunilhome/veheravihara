<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temple Page</title>
<meta name="description" id="metaDescription" content="">

<style>
body { font-family: sans-serif; padding: 20px; }
.sub-band-text, .sub-band-text1 { margin: 10px 0; font-size: 18px; }
h3 { margin-top: 30px; color: blue; }
</style>
</head>
<body>

<div class="sub-band-text">
    <p id="templeSI"></p>
</div>

<div class="sub-band-text1">
    <p id="templeEN"></p>
</div>

<!-- Test span to see full title -->
<h3>Full title: <span id="fullTitle"></span></h3>

<script>
fetch("info.txt")
.then(res => res.text())
.then(data => {

    const info = {};
    data.split("\n").forEach(line => {
        const parts = line.split("=");
        if(parts.length >= 2){
            const key = parts[0].trim();
            const value = parts.slice(1).join("=").trim();
            info[key] = value;
        }
    });

    // Fill the page
    document.getElementById("templeSI").textContent = info.si || "";
    document.getElementById("templeEN").textContent = info.en || "";

    // ✅ Update title
    const newTitle = (info.en || "Temple") + " | Buddhist Temple | Sri Lanka";
    document.title = newTitle;

    // ✅ Show title in test span
    document.getElementById("fullTitle").textContent = newTitle;

});
</script>

</body>
</html>
