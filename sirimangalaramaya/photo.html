<!-- LOAD TEMPLE INFO -->
<script>

fetch("info.txt")
.then(res => res.text())
.then(data => {

const info = {};

data.split("\n").forEach(line => {

const parts = line.split("=");

if(parts.length >= 2){

const key = parts[0].trim();
const value = parts.slice(1).join("=").trim();
info[key] = value;

}

});

document.getElementById("templeSI").textContent = info.si || "";
document.getElementById("templeEN").textContent = info.en || "";
document.getElementById("templeVillage").textContent = info.village || "";

const newTitle = (info.en || "Temple") + " | Photos | Sri Lanka";
document.title = newTitle;

document.getElementById("metaDescription")
.setAttribute("content", info.desc || "");

})
.catch(err => console.log("Info load error", err));

<script>

let gallery = document.getElementById("photo-gallery");
let i = 1;

function loadNextImage(){

let img = new Image();
img.src = i + ".webp";
img.className = "main-image";
img.alt = "Buddhist Temple Photo";

img.onload = function(){
    gallery.appendChild(img);
    i++;
    loadNextImage();
};

img.onerror = function(){
    i++;
    if(i <= 30){      // try up to 30 images
        loadNextImage();
    }
};

}

loadNextImage();

</script>
