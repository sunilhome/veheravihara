<script>
document.addEventListener("DOMContentLoaded", function() {
    const templeID = "t-2";

    fetch("info.txt")
    .then(res => res.text())
    .then(data => {
        const info = {};
        let reading = false;

        data.split("\n").forEach(line => {
            line = line.trim();
            if (!line) return;

            if (line === `id=${templeID}`) {
                reading = true;
                return;
            } 

            if (reading && line.startsWith("id=")) {
                reading = false;
                return;
            }

            if (reading && line.includes("=")) {
                const [key, ...rest] = line.split("=");
                info[key.trim()] = rest.join("=").trim();
            }
        });
        console.log("Info loaded:", info);
        document.getElementById("abbot-info").textContent = info.abbot || "";
        document.querySelector(".event-note").textContent = info.note || "";
		document.querySelector(".event-note1").textContent = info.note1 || "";
		
    })
    .catch(err => console.error("Temple info error:", err));
});
</script>
