<audio id="a1" src="audio1.mp3"></audio>
<audio id="a2" src="audio2.mp3"></audio>

<script>
let currentAudio = null;
let currentBtn = null;

function toggleAudio(id, btn) {
  const audio = document.getElementById(id);

  // same button clicked → stop & reset
  if (currentAudio === audio && !audio.paused) {
    audio.pause();
    audio.currentTime = 0;
    btn.classList.remove('active');
    currentAudio = null;
    currentBtn = null;
    return;
  }

  // stop previous audio
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentBtn) {
    currentBtn.classList.remove('active');
  }

  // play new audio
  audio.play();
  btn.classList.add('active');

  currentAudio = audio;
  currentBtn = btn;

  // 🔹 RESET WHEN AUDIO ENDS
  audio.onended = function () {
    btn.classList.remove('active');
    currentAudio = null;
    currentBtn = null;
  };
}
</script>

  <!-- SCRIPT -->
  <script>
    async function loadInfo(lang) {
      const file = lang === 'si' ? 'info-si.txt' : 'info-en.txt';
      const box = document.getElementById('temple-text');
      const title = document.getElementById('history-title');

      title.textContent = (lang === 'si') ? 'ඉතිහාසය' : 'History';
      box.innerHTML = '';

      try {
        const res = await fetch(file);
        const text = await res.text();

        text.split(/\r?\n\r?\n|\r?\n/).forEach(line => {
          const t = line.trim();
          if (!t) return;

          if (t.startsWith('#')) {
            const h3 = document.createElement('h3');
            h3.textContent = t.substring(1).trim();
            box.appendChild(h3);
          } else {
            const p = document.createElement('p');
            p.textContent = t;
            box.appendChild(p);
          }
        });

      } catch {
        box.textContent = 'Information not available.';
      }
    }

    // initial load
    loadInfo('si');
  </script>
