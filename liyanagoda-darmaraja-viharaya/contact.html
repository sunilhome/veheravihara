<meta property="og:description" id="ogDesc" content="">

<body>

<!-- top fixed band -->
<div class="top-band">
  <a href="index.html" class="top-icon">&#8592;</a>
  <a href="/index.html" class="top-icon">&#127969;</a>
  <a href="tel:+94766178102" class="top-icon">&#128222;</a>
  <a href="contact.html" class="top-icon">&#128233;</a>
</div>

<!-- content -->
<div class="content">

  <!-- full-width sub-band inside content -->
  <div class="sub-band">
    <img src="../provinces/1.png" class="sub-band-icon" alt="Icon">

    <!-- Sinhala text -->
    <div class="sub-band-text">
      <p id="templeSI"></p>
    </div>

    <div class="sub-band-text1">
      <p id="templeEN"></p>
    </div>
  </div>  

  <!-- CONTACT DETAILS -->
  <div class="info-box">
    <!-- Map -->
    <div class="contact-item">
      <iframe id="contact-map"
        width="100%" height="250"
        style="border:0;"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>

    <div class="contact-info">
      <p class="contact-row">
        <span class="label en">Address:</span>
        <span class="label si">ලිපිනය:</span>
        <span class="value" id="contact-address"></span>
      </p>

      <p class="contact-row">
        <span class="label en">Email:</span>
        <span class="label si">ඊ-තැපැල්:</span>
        <span class="value" id="contact-email"></span>
      </p>

      <p class="contact-row">
        <span class="label en">Telephone:</span>
        <span class="label si">දුරකථන:</span>
        <a class="value" id="contact-telephone" href=""></a>
      </p>

      <p class="contact-row">
        <span class="label en">Website:</span>
        <span class="label si">වෙබ් අඩවිය:</span>
        <span class="value" id="contact-website"></span>
      </p>
    </div>
  </div>

</div>

<!-- Scripts -->

<script>
fetch("info.txt")
  .then(res => res.text())
  .then(data => {
    const info = {};
    data.split("\n").forEach(line => {
      const parts = line.split("=");
      if(parts.length >= 2){
        const key = parts[0].trim();
        const value = parts.slice(1).join("=").trim();
        info[key] = value;
      }
    });

    // Temple names
    document.getElementById("templeSI").textContent = info.si || "";
    document.getElementById("templeEN").textContent = info.en || "";

    // Contact details
    document.getElementById("contact-address").textContent = info.address || "";
    document.getElementById("contact-email").textContent = info.email || "";
    document.getElementById("contact-website").textContent = info.website || "";

// Map
if(info.map){
  document.getElementById("contact-map").src = info.map;
}
    const telEl = document.getElementById("contact-telephone");
    if(info.telephone){
      telEl.textContent = info.telephone;
      telEl.href = "tel:" + info.telephone.replace(/\s+/g, "");
    }

    // Title
    const newTitle = (info.en || "Temple") + " | " + (info.si || "") + " | Sri Lanka";
    document.title = newTitle + " | Contact";

    // Description
    const desc = "Contact details of " + (info.en || "Temple") + " in Sri Lanka.";
    document.getElementById("metaDescription").setAttribute("content", desc);

    // OG
    document.getElementById("ogTitle").setAttribute("content", newTitle + " Contact");
    document.getElementById("ogDesc").setAttribute("content", desc);

    // URL
    const cleanURL = window.location.href.split("?")[0];
    document.getElementById("canonicalLink").setAttribute("href", cleanURL);
    document.getElementById("ogURL").setAttribute("content", cleanURL);
  })
  .catch(err => console.error("Info load error:", err));
</script>
