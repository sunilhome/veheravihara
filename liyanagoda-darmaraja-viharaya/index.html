<script>
fetch("info.txt")
.then(res => res.text())
.then(data => {
    const info = {};
    data.split("\n").forEach(line => {
        const parts = line.split("=");
        if(parts.length >= 2){
            const key = parts[0].trim();
            const value = parts.slice(1).join("=").trim();
            info[key] = value;
        }
    });

    // Content
    document.getElementById("templeSI").textContent = info.si || "";
    document.getElementById("templeEN").textContent = info.en || "";
    document.getElementById("abbot-info").textContent = info.abbot || "";
const noteEl = document.querySelector(".event-note");
if(noteEl) noteEl.textContent = info.note || "";

const noteEl1 = document.querySelector(".event-note1");
if(noteEl1) noteEl1.textContent = info.note1 || "";
    // Title
	const newTitle = (info.en || "Temple") + " | " + (info.si || "") + " | Sri Lanka";
    document.title = newTitle;

    // ✅ SEO Description (better version)
    let description = info.desc || "";
    if(info.si && info.district){
        description = info.si + " " + info.district + " දිස්ත්‍රික්කයේ පිහිටි බෞද්ධ විහාරස්ථානයකි. ඡායාරූප, ඉතිහාසය සහ සිතියම veheravihara.lk";
    }
    document.getElementById("metaDescription").setAttribute("content", description);

    // ✅ Open Graph (Facebook)
    document.getElementById("ogTitle").setAttribute("content", newTitle);
    document.getElementById("ogDesc").setAttribute("content", description);

    // ✅ URL (important for Facebook + SEO)
    const cleanURL = window.location.href.split("?")[0];
    document.getElementById("canonicalLink").setAttribute("href", cleanURL);
    document.getElementById("ogURL").setAttribute("content", cleanURL);

})
.catch(err => console.error("Info load error:", err));
</script>

    index = (index + 1) % images.length;
    img.src = images[index];
  }, 3000);
</script>
