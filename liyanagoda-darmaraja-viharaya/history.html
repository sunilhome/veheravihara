<!-- AUDIO SCRIPT -->
<script>
let currentAudio = null;
let currentBtn = null;

function toggleAudio(id, btn) {
  const audio = document.getElementById(id);

  if (currentAudio === audio && !audio.paused) {
    audio.pause();
    audio.currentTime = 0;
    btn.classList.remove('active');
    currentAudio = null;
    currentBtn = null;
    return;
  }

  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentBtn) currentBtn.classList.remove('active');

  audio.play();
  btn.classList.add('active');

  currentAudio = audio;
  currentBtn = btn;

  audio.onended = function () {
    btn.classList.remove('active');
    currentAudio = null;
    currentBtn = null;
  };
}
</script>

<!-- MAIN SEO + INFO SCRIPT -->
<script>
let templeName = "";

fetch("info.txt")
.then(res => res.text())
.then(data => {
    const info = {};
    data.split("\n").forEach(line => {
        const parts = line.split("=");
        if(parts.length >= 2){
            const key = parts[0].trim();
            const value = parts.slice(1).join("=").trim();
            info[key] = value;
        }
    });

    // Temple names
    document.getElementById("templeSI").textContent = info.si || "";
    document.getElementById("templeEN").textContent = info.en || "";

    templeName = info.en || "Temple";

    // TITLE
    const newTitle = templeName + " | " + (info.si || "") + " | Sri Lanka";
    document.title = newTitle + " | History";

    // DESCRIPTION
    let description = templeName + " history, Sri Lanka Buddhist temple information.";
    document.getElementById("metaDescription").setAttribute("content", description);

    // OG + TWITTER
    document.getElementById("ogTitle").setAttribute("content", newTitle + " History");
    document.getElementById("ogDesc").setAttribute("content", description);
    document.getElementById("twTitle").setAttribute("content", newTitle + " History");
    document.getElementById("twDesc").setAttribute("content", description);

    // IMAGE (same as index)
    const imageURL = window.location.origin + window.location.pathname.replace("history.html","") + "x.webp";
    document.getElementById("ogImage").setAttribute("content", imageURL);
    document.getElementById("twImage").setAttribute("content", imageURL);

    // URL
    const cleanURL = window.location.href.split("?")[0];
    document.getElementById("canonicalLink").setAttribute("href", cleanURL);
    document.getElementById("ogURL").setAttribute("content", cleanURL);

})
.catch(err => console.error("Info load error:", err));
</script>

<!-- HISTORY LOAD SCRIPT -->
<script>
async function loadInfo(lang) {
  const file = lang === 'si' ? 'info-si.txt' : 'info-en.txt';
  const box = document.getElementById('temple-text');
  const title = document.getElementById('history-title');

  title.textContent = (lang === 'si') ? 'ඉතිහාසය' : 'History';
  box.innerHTML = '';

  try {
    const res = await fetch(file);
    const text = await res.text();

    text.split(/\r?\n\r?\n|\r?\n/).forEach(line => {
      const t = line.trim();
      if (!t) return;

      if (t.startsWith('#')) {
        const h3 = document.createElement('h3');
        h3.textContent = t.substring(1).trim();
        box.appendChild(h3);
      } else {
        const p = document.createElement('p');
        p.textContent = t;
        box.appendChild(p);
      }
    });

  } catch {
    box.textContent = 'Information not available.';
  }
}

loadInfo('si');
</script>
